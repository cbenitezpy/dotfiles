# sops configuration — define quién puede descifrar los secrets.
# La clave pública age se inyecta acá automáticamente al correr:
#   ./secrets/manage.sh init-key
#
# Es SEGURO commitear este archivo (solo contiene la clave PÚBLICA).
creation_rules:
  - path_regex: secrets/.*\.sops\.env$
    age: "REPLACE_WITH_YOUR_AGE_PUBLIC_KEY"
