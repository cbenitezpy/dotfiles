"$schema" = 'https://starship.rs/config-schema.json'

# Bump from default 500ms ÔÇö slow Python interpreters (Downloads/quarantined
# dirs, first-warmup venvs) can take >500ms to report their version.
command_timeout = 2000

# Two-line prompt: info on top, character below for fast typing
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$golang\
$rust\
$terraform\
$kubernetes\
$gcloud\
$aws\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

add_newline = true

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold blue"

[username]
show_always = false
style_user = "yellow bold"
style_root = "red bold"
format = "[$user]($style) "

[hostname]
ssh_symbol = "¯¼ü "
ssh_only = true
format = "on [$hostname]($style) "
style = "bold green"

[directory]
truncation_length = 4
truncation_symbol = "ÔÇĞ/"
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only_style = "red"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = "´Éİ "
format = "on [$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ô£İ${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "yellow"

[time]
disabled = false
format = "[$time]($style)"
style = "bold dimmed white"
time_format = "%H:%M"

[kubernetes]
symbol = "¾▒â¥ "
disabled = false
format = 'on [$symbol$context( \($namespace\))]($style) '
style = "bold blue"
detect_files = ['k8s', 'kustomization.yaml', 'Chart.yaml']
detect_folders = ['k8s', 'helm']

[gcloud]
symbol = "¾▒çÂ "
format = 'on [$symbol$account@$project]($style) '
style = "bold yellow"
disabled = false

[python]
symbol = "¯êÁ "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"

[nodejs]
symbol = "¯£İ "
format = "via [$symbol($version )]($style)"
style = "bold green"

[golang]
symbol = "¯İğ "
