"$schema" = 'https://starship.rs/config-schema.json'

# Two-line prompt: info on top, character below for fast typing
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$golang\
$rust\
$terraform\
$kubernetes\
$gcloud\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

add_newline = true

[character]
success_symbol = "[έζψ](bold green)"
error_symbol = "[έζψ](bold red)"
vimcmd_symbol = "[έζχ](bold green)"

[os]
disabled = false
format = "[$symbol]($style) "
style = "bold blue"

[username]
show_always = false
style_user = "yellow bold"
style_root = "red bold"
format = "[$user]($style) "

[hostname]
ssh_symbol = "ΌυΒ "
ssh_only = true
format = "on [$hostname]($style) "
style = "bold green"

[directory]
truncation_length = 4
truncation_symbol = "έΑο/"
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only_style = "red"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = "ΎΡα "
format = "on [$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "έΘκ${count}"
behind = "έΘμ${count}"
diverged = "έΘΧέΘκ${ahead_count}έΘμ${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "έεα${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "yellow"

[time]
disabled = false
format = "[$time]($style)"
style = "bold dimmed white"
time_format = "%H:%M"

[kubernetes]
symbol = "≤▒Δ╛ "
disabled = false
format = 'on [$symbol$context( \($namespace\))]($style) '
style = "bold blue"
detect_files = ['k8s', 'kustomization.yaml', 'Chart.yaml']
detect_folders = ['k8s', 'helm']

[gcloud]
symbol = "≤▒Θ╢ "
format = 'on [$symbol$account@$project]($style) '
style = "bold yellow"
disabled = false

[python]
symbol = "ΌΙ╡ "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"

[nodejs]
symbol = "Όεα "
format = "via [$symbol($version )]($style)"
style = "bold green"

[golang]
symbol = "Όαπ "
format = "via [$symbol($version )]($style)"
style = "bold cyan"

[rust]
symbol = "≤▒αΩ "
format = "via [$symbol($version )]($style)"
style = "bold red"

[terraform]
symbol = "Όγγ "
format = "via [$symbol$workspace]($style) "
style = "bold 105"

[docker_context]
symbol = "ΎΝΙ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true

